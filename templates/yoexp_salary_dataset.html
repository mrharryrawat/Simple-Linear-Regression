<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Predictor</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            color: green;
            font-weight: bold;
        }

        .note {
            font-size: 12px;
            color: gray;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Salary Prediction</h2>

    <form action="/predict" method="POST">

        <input
            type="number"
            name="experience"
            min="0"
            max="10"
            step="0.1"
            placeholder="Years of Experience (0-10)"
            required
        >

        <br>

        <button type="submit">Predict Salary</button>

    </form>

    <div class="note">
        Maximum allowed experience: 10 years
    </div>

    {% if prediction %}
    <div class="result">
        Experience: {{ experience }} Years
        <br><br>
        Predicted Salary:
        <br>
        ₹ {{ prediction }}
    </div>
    {% endif %}

</div>

</body>
</html>
